<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>PLT Framework - The Calculation: 3D Book</title>
    <style>
        body { margin:0; overflow:hidden; font-family:'Georgia',serif; }
        #info {
            position: absolute; top: 20px; left: 20px;
            background: rgba(0,0,0,0.7); color: #ffd966;
            padding: 8px 18px; border-radius: 30px; font-size: 14px;
            pointer-events: none; z-index: 10; backdrop-filter: blur(5px);
            font-weight: bold;
        }
        #controls {
            position: absolute; bottom: 20px; left: 20px; right: 20px;
            display: flex; justify-content: space-between; gap: 15px;
            z-index: 20; pointer-events: none;
        }
        button {
            pointer-events: auto; background: #2c1e12; color: #efdba1;
            border: none; padding: 10px 22px; border-radius: 40px;
            font-weight: bold; cursor: pointer; font-family: monospace;
            font-size: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.3);
            transition: transform 0.1s ease;
        }
        button:active { transform: scale(0.96); }
        #page-num {
            background: rgba(0,0,0,0.6); color: white; padding: 6px 16px;
            border-radius: 30px; font-size: 14px; font-family: monospace;
            pointer-events: none;
        }
        .hint {
            position: absolute; top: 80px; right: 20px;
            background: rgba(0,0,0,0.5); color: #ccc; padding: 6px 12px;
            border-radius: 20px; font-size: 12px; font-family: monospace;
            pointer-events: none; z-index: 10;
        }
        @media (max-width:700px) { button { padding: 6px 14px; font-size: 12px; } #info { font-size: 10px; } }
    </style>
</head>
<body>
    <div id="info">📖 THE CALCULATION · Profit · Love · Tax</div>
    <div id="controls">
        <button id="prevBtn">◀ PREV</button>
        <div id="page-num">1 / 6</div>
        <button id="nextBtn">NEXT ▶</button>
    </div>
    <div class="hint">🖱️ Drag book to move | ⬅➡ arrows | Scroll zoom</div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.128.0/build/three.module.js", "three/addons/": "https://unpkg.com/three@0.128.0/examples/jsm/" } }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // --- Scene ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        scene.fog = new THREE.FogExp2(0x0a0a2a, 0.008);
        const camera = new THREE.PerspectiveCamera(45, innerWidth/innerHeight, 0.1, 1000);
        camera.position.set(3.5, 2.2, 4);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(innerWidth, innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true; controls.dampingFactor = 0.05;
        controls.zoomSpeed = 1.2; controls.rotateSpeed = 1.0;
        controls.target.set(0, 0.2, 0);

        const amb = new THREE.AmbientLight(0x404060);
        scene.add(amb);
        const main = new THREE.DirectionalLight(0xfff5e6, 1.2);
        main.position.set(4,5,3); main.castShadow = true; scene.add(main);
        const fill = new THREE.PointLight(0x5577aa, 0.4);
        fill.position.set(1,1,2); scene.add(fill);
        const back = new THREE.PointLight(0xffaa66, 0.3);
        back.position.set(-1,1.5,-2); scene.add(back);

        const grid = new THREE.GridHelper(12,20,0x88aaff,0x335588);
        grid.position.y = -0.6; grid.material.transparent = true;
        grid.material.opacity = 0.25; scene.add(grid);

        // --- Book content ---
        const pageContents = [
            { title: "THE HIDDEN EQUATION", body: "Every decision is a three-part equation. Most people solve for one variable.\n\nProfit: What you gain.\nLove: Trust, identity, energy.\nTax: What it actually costs." },
            { title: "THE PRICE OF FREE", body: "Nothing without a cost is free. It is deferred Tax.\n\nFree entry means someone else set the price and hid it.\nDeferred Tax accrues interest.\n\nEquity is a bet. Work is a cost." },
            { title: "COMFORT DEBT", body: "Comfort compounds into regret.\n\nEvery year you stay in the wrong place is a year you don't spend in the right one.\nNot deciding is a decision. The universe completes it for you." },
            { title: "THE LOVE LEDGER", body: "Trust takes years to build and one decision to destroy.\n\nYou cannot spend trust you haven't deposited.\nLove without maintenance becomes debt. Debt gets collected." },
            { title: "IDENTITY ARITHMETIC", body: "You become what you tolerate.\n\nThe environment you stay in longest becomes the person you become.\nSmall compromises don't feel like loss. They are.\nIdentity recovery costs more than maintenance." }
        ];

        function createPageCanvas(content, isCover) {
            const canvas = document.createElement('canvas');
            canvas.width = 1024; canvas.height = 1400;
            const ctx = canvas.getContext('2d');
            if (isCover) {
                ctx.fillStyle = '#3a281a'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#d4af37'; ctx.font = 'Bold 80px Georgia,serif';
                ctx.textAlign = 'center';
                ctx.fillText('THE', canvas.width/2, 340);
                ctx.font = 'Bold 100px Georgia,serif'; ctx.fillText('CALCULATION', canvas.width/2, 500);
                ctx.font = '44px Georgia,serif'; ctx.fillStyle = '#c9a87c';
                ctx.fillText('Profit · Love · Tax', canvas.width/2, 620);
                ctx.font = '32px monospace'; ctx.fillStyle = '#a08060';
                ctx.fillText('Craig Jones · Little Bunny', canvas.width/2, 760);
            } else {
                ctx.fillStyle = '#fdf8ed'; ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.strokeStyle = '#b97f44'; ctx.lineWidth = 16;
                ctx.strokeRect(24, 24, canvas.width-48, canvas.height-48);
                ctx.fillStyle = '#4a2a14'; ctx.font = 'Bold 56px Georgia,serif';
                ctx.textAlign = 'center';
                ctx.fillText(content.title, canvas.width/2, 110);
                ctx.beginPath(); ctx.moveTo(100, 150);
                ctx.lineTo(canvas.width-100, 150);
                ctx.strokeStyle = '#c99a6b'; ctx.lineWidth = 3; ctx.stroke();
                ctx.fillStyle = '#2c1a0e'; ctx.font = '36px Georgia,serif';
                ctx.textAlign = 'left';
                const mw = canvas.width - 120, lh = 52;
                let y = 220;
                const words = content.body.split(' ');
                let line = '';
                for (let i = 0; i < words.length; i++) {
                    const t = line + words[i] + ' ';
                    if (ctx.measureText(t).width > mw && line.length) {
                        ctx.fillText(line, 60, y); line = words[i] + ' '; y += lh;
                    } else line = t;
                }
                ctx.fillText(line, 60, y);
                ctx.font = '28px monospace'; ctx.fillStyle = '#a5713c';
                ctx.textAlign = 'center';
                ctx.fillText('✦ PLT FRAMEWORK ✦', canvas.width/2, canvas.height-50);
            }
            return new THREE.CanvasTexture(canvas);
        }

        // --- Book Group ---
        const book = new THREE.Group();
        scene.add(book);
        book.position.set(0, 0.1, 0);

        const CW = 2.2, CH = 2.8, SW = 0.18, PT = 0.02;
        const SEG = 28;
        const PW = CW - 0.15, PH = CH - 0.2;
        const HINGE_X = -CW / 2;

        const coverMat = new THREE.MeshStandardMaterial({ color: 0x3a281a, roughness: 0.4, metalness: 0.1 });
        const frontCover = new THREE.Mesh(new THREE.BoxGeometry(CW, CH, 0.08), coverMat);
        frontCover.castShadow = true; frontCover.position.set(0, 0, SW/2+0.04);
        book.add(frontCover);

        const spine = new THREE.Mesh(new THREE.BoxGeometry(SW, CH, 0.12),
            new THREE.MeshStandardMaterial({ color: 0x5a3a22, roughness: 0.3 }));
        spine.position.set(-CW/2-SW/2, 0, 0);
        book.add(spine);

        const backCover = new THREE.Mesh(new THREE.BoxGeometry(CW, CH, 0.08), coverMat);
        backCover.position.set(0, 0, -SW/2-0.04);
        backCover.castShadow = true;
        book.add(backCover);

        // --- Pages: PlaneGeometry with vertex bend ---
        const pages = [];
        const origPosData = [];
        const startZ = -SW/2 - 0.02;

        function makePage(texture) {
            const geo = new THREE.PlaneGeometry(PW, PH, SEG, SEG);
            // Shift so left edge at 0, right edge at PW (in mesh-local space)
            geo.translate(PW/2, 0, 0);
            const mat = new THREE.MeshStandardMaterial({
                map: texture, side: THREE.DoubleSide, roughness: 0.3
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.castShadow = true;
            // Position mesh so its left edge aligns with hinge (HINGE_X)
            mesh.position.set(HINGE_X, 0, 0);
            const pos = geo.attributes.position.array.slice();
            return { mesh, geo, pos, mat };
        }

        function buildPages() {
            for (let i = 0; i < pageContents.length; i++) {
                const tex = createPageCanvas(pageContents[i]);
                const p = makePage(tex);
                p.mesh.position.z = startZ + i * PT + PT/2;
                book.add(p.mesh);
                pages.push(p);
                origPosData.push(new Float32Array(p.pos));
            }
            const coverTex = createPageCanvas(null, true);
            const cp = makePage(coverTex);
            cp.mesh.position.z = startZ + pageContents.length * PT + PT/2;
            book.add(cp.mesh);
            pages.unshift(cp);
            origPosData.unshift(new Float32Array(cp.pos));
        }
        buildPages();

        const totalPages = pages.length;
        let currentPage = 0;
        let isFlipping = false;

        function applyBend(pg, progress) {
            // pg = pages[idx], progress 0..1
            const pos = pg.geo.attributes.position;
            const orig = pg.pos;
            if (!orig) return;
            const angle = progress * Math.PI;
            const cosA = Math.cos(angle), sinA = Math.sin(angle);
            const bendMag = Math.sin(angle) * 0.32;

            for (let i = 0; i < pos.count; i++) {
                const ox = orig[i*3], oy = orig[i*3+1], oz = orig[i*3+2] || 0;
                // ox in mesh-local space: 0..PW. hinge is at HINGE_X in world.
                // distance from hinge = ox (because mesh is at HINGE_X, so worldX = HINGE_X + ox)
                const dx = ox;
                const t = dx / PW; // 0..1 across page
                const bendCurve = Math.sin(t * Math.PI);
                const bendZ = bendCurve * bendMag;
                // Rotate around hinge (local x=0, world x=HINGE_X)
                const newX = dx * cosA;
                const newZ = dx * sinA + bendZ;
                pos.setXYZ(i, newX, oy, newZ);
            }
            pos.needsUpdate = true;
            pg.geo.computeVertexNormals();
        }

        function showPage(idx) {
            pages.forEach((p, i) => { p.mesh.visible = (i === idx); });
            document.getElementById('page-num').textContent = `${idx+1} / ${totalPages}`;
        }

        function resetPages() {
            pages.forEach((p, i) => {
                const pos = p.geo.attributes.position;
                const orig = origPosData[i];
                for (let j = 0; j < pos.count; j++) {
                    pos.setXYZ(j, orig[j*3], orig[j*3+1], 0);
                }
                pos.needsUpdate = true;
                p.geo.computeVertexNormals();
                p.mesh.visible = false;
            });
            showPage(currentPage);
        }

        function flipPage(dir) {
            const newIdx = currentPage + dir;
            if (newIdx < 0 || newIdx >= totalPages || isFlipping) return;
            isFlipping = true;
            const src = pages[currentPage];
            src.mesh.visible = true;
            const maxZ = Math.max(...pages.map(p => p.mesh.position.z));
            src.mesh.position.z = maxZ + PT;

            const start = performance.now();
            const duration = 380;

            function anim(now) {
                const t = Math.min(1, (now - start) / duration);
                const ease = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
                applyBend(src, ease);
                if (t >= 1) {
                    const minZ = Math.min(...pages.map(p => p.mesh.position.z));
                    src.mesh.position.z = minZ - PT;
                    // Reset positions
                    const pos = src.geo.attributes.position;
                    const orig = origPosData[pages.indexOf(src)];
                    for (let j = 0; j < pos.count; j++) pos.setXYZ(j, orig[j*3], orig[j*3+1], 0);
                    pos.needsUpdate = true;
                    src.geo.computeVertexNormals();
                    currentPage = newIdx;
                    resetPages();
                    isFlipping = false;
                    return;
                }
                requestAnimationFrame(anim);
            }
            requestAnimationFrame(anim);
        }

        // --- Grabbing ---
        const ray = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let grabbing = false, grabOff = new THREE.Vector3();
        const origBookPos = new THREE.Vector3(0, 0.1, 0);

        function getHit(e) {
            const r = renderer.domElement.getBoundingClientRect();
            mouse.x = ((e.clientX - r.left)/r.width)*2-1;
            mouse.y = -((e.clientY - r.top)/r.height)*2+1;
            ray.setFromCamera(mouse, camera);
            const hits = ray.intersectObject(book, true);
            return hits.length ? hits[0].point : null;
        }

        renderer.domElement.addEventListener('mousedown', e => {
            const p = getHit(e);
            if (p) { grabbing = true; grabOff = book.position.clone().sub(p); controls.enabled = false; }
        });
        window.addEventListener('mousemove', e => {
            if (!grabbing) return;
            const p = getHit(e);
            if (p) { const n = p.clone().add(grabOff); n.y = Math.min(1, Math.max(-0.2, n.y)); book.position.copy(n); }
        });
        window.addEventListener('mouseup', () => { grabbing = false; controls.enabled = true; });
        renderer.domElement.addEventListener('touchstart', e => { e.preventDefault(); const p = getHit(e.touches[0]); if (p) { grabbing = true; grabOff = book.position.clone().sub(p); controls.enabled = false; } });
        window.addEventListener('touchmove', e => { if (grabbing) { e.preventDefault(); const p = getHit(e.touches[0]); if (p) { const n = p.clone().add(grabOff); n.y = Math.min(1, Math.max(-0.2, n.y)); book.position.copy(n); } } });
        window.addEventListener('touchend', () => { grabbing = false; controls.enabled = true; });

        document.getElementById('prevBtn').onclick = () => flipPage(-1);
        document.getElementById('nextBtn').onclick = () => flipPage(1);
        window.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') flipPage(-1);
            if (e.key === 'ArrowRight') flipPage(1);
        });

        const reset = document.createElement('button');
        reset.textContent = '⟳ Reset';
        reset.style.cssText = 'position:absolute;top:20px;right:20px;background:#2c1e12;color:#efdba1;border:none;padding:8px 16px;border-radius:30px;cursor:pointer;font-family:monospace;z-index:20';
        document.body.appendChild(reset);
        reset.onclick = () => { book.position.copy(origBookPos); camera.position.set(3.5, 2.2, 4); controls.target.set(0, 0.2, 0); controls.update(); };

        const pg = new THREE.BufferGeometry();
        const pa = new Float32Array(600*3);
        for (let i=0;i<600;i++) { pa[i*3]=(Math.random()-0.5)*12; pa[i*3+1]=(Math.random()-0.5)*4; pa[i*3+2]=(Math.random()-0.5)*10-3; }
        pg.setAttribute('position', new THREE.BufferAttribute(pa, 3));
        const pp = new THREE.Points(pg, new THREE.PointsMaterial({ color: 0xffaa77, size:0.03, transparent:true, opacity:0.4 }));
        scene.add(pp);

        function animate() {
            pp.rotation.y += 0.002; pp.rotation.x += 0.001;
            controls.update(); renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        resetPages();
        showPage(0);
        animate();
        window.addEventListener('resize', () => { camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth, innerHeight); });
    </script>
</body>
</html>
